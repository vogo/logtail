name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.7.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match pattern vX.Y.Z (e.g. v1.7.0)"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install mvdan.cc/gofumpt@latest
          go install github.com/vogo/license-header-checker/cmd/license-header-checker@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build
        run: make build

      - name: Integration Test
        run: make integration

      - name: Build release binaries
        run: |
          mkdir -p dist
          platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64" "windows/arm64")
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            BINARY=logtail
            if [ "$GOOS" = "windows" ]; then
              BINARY=logtail.exe
            fi
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "${BINARY}" logtail.go
            ARCHIVE="dist/logtail-${{ inputs.version }}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              zip "${ARCHIVE}.zip" "${BINARY}"
            else
              tar czf "${ARCHIVE}.tar.gz" "${BINARY}"
            fi
            rm -f "${BINARY}"
          done

      - name: Create and push tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            dist/logtail-*.tar.gz
            dist/logtail-*.zip
